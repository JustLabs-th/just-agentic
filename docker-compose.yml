services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: just_agentic
      POSTGRES_USER: just_agentic
      POSTGRES_PASSWORD: just_agentic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U just_agentic -d just_agentic"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
